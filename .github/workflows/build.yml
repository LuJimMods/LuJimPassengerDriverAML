name: Build LuJim Passenger Driver

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK r21e
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e
          add-to-path: true

      - name: Build armeabi-v7a
        run: |
          cd jni
          ndk-build -j2

      - name: Package mod
        run: |
          mkdir -p artifact/mods/configs
          cp libs/armeabi-v7a/libLuJimPassengerDriver.so artifact/mods/libLuJimPassengerDriver.so
          cp configs/LuJimPassengerDriver.ini artifact/mods/configs/LuJimPassengerDriver.ini || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuJimPassengerDriver
          path: artifact/
