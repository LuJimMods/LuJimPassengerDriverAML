name: Build LuJim Passenger Driver

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK r21e
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e
          add-to-path: true

      - name: Build 32 and 64 bits
        run: |
          ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk NDK_APPLICATION_MK=Application.mk -j2

      - name: Package mod
        run: |
          mkdir -p artifact/LuJimPassengerDriver/mods
          mkdir -p artifact/LuJimPassengerDriver/configs/LuJimPassengerDriver

          cp libs/armeabi-v7a/libLuJimPassengerDriver.so artifact/LuJimPassengerDriver/mods/libLuJimPassengerDriver.so

          if [ -f libs/arm64-v8a/libLuJimPassengerDriver.so ]; then
            cp libs/arm64-v8a/libLuJimPassengerDriver.so artifact/LuJimPassengerDriver/mods/libLuJimPassengerDriver64.so
          fi

          if [ -f LuJimPassengerDriver.ini ]; then
            cp LuJimPassengerDriver.ini artifact/LuJimPassengerDriver/configs/LuJimPassengerDriver/LuJimPassengerDriver.ini
          fi

          touch artifact/LuJimPassengerDriver/configs/LuJimPassengerDriver/LuJimPassengerDriver.log

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuJimPassengerDriver
          path: artifact/LuJimPassengerDriver/
